<!DOCTYPE html>
<html class="no-js" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>
    {% if page.url == "/" %}
      {{ site.title }}
    {% else %}
      {{ page.title }} / {{ site.title }}
    {% endif %}
  </title>
  <meta name="description" content="{{ page.description | default: 'Cool stuff made by Daszeal' }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link id="favicon" rel="icon" href="{{ '/assets/images/Favicon-light.png' | relative_url }}">
  <script>
    function updateFavicon() {
      const favicon = document.getElementById('favicon');
      const homeFavicon = document.getElementById('home-favicon');
      const isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      const darkIcon = '{{ '/assets/images/Favicon-dark.png' | relative_url }}';
      const lightIcon = '{{ '/assets/images/Favicon-light.png' | relative_url }}';

      if (favicon) favicon.href = isDark ? darkIcon : lightIcon;
      if (homeFavicon) homeFavicon.src = isDark ? darkIcon : lightIcon;
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', updateFavicon);
    } else {
      updateFavicon();
    }

    if (window.matchMedia) {
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', updateFavicon);
    }
  </script>
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "{{ site.title }}",
      "url": "{{ site.url }}"
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" defer></script>
  <script src="{{ '/assets/js/main.js' | relative_url }}" defer></script>
</head>
<body class="preload{% if page.body_class %} {{ page.body_class }}{% endif %}">
<main>
  {{ content }}
</main>
{% include footer.html %}
<a href="/catalog/" class="seo-title">Page Catalog</a>
</body>
</html>
