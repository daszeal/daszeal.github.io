---
layout: default
title: Tools
permalink: /tools/
---

<div class="home-toc">
  <aside class="toc-sidebar">
    <a href="/" class="no-animation back-button">← Home</a>
  </aside>

  <div class="home-content">
    <h1>Tools</h1>
    <p>Some fun calculators I made, KSP focused.</p>

    <div class="tools-grid">
      {% assign sorted_tools = site.tools | sort: "order" %}
      {% for tool in sorted_tools %}
        <a href="{{ tool.url | relative_url }}" class="card tool-card reveal no-underline {{ tool.tool_bg_effect | default: 'bg-expand' }}">
          <div class="tool-bg" style="background-image:url('{{ tool.thumbnail }}')"></div>
          <div class="tool-content">
            <h3>{{ tool.title }}</h3>
            <p>{{ tool.description }}</p>
          </div>
        </a>
      {% endfor %}
    </div>
  </div>
</div>
