  <script>
    // Favicon switcher for dark/light mode
    function updateFavicon() {
      const favicon = document.getElementById('favicon');
      const homeFavicon = document.getElementById('home-favicon');
      const isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      
      if (isDark) {
        favicon.href = '/assets/images/Favicon-dark.png';
        if (homeFavicon) {
          homeFavicon.src = '/assets/images/Favicon-dark.png';
        }
      } else {
        favicon.href = '/assets/images/Favicon-light.png';
        if (homeFavicon) {
          homeFavicon.src = '/assets/images/Favicon-light.png';
        }
      }
    }
    
    // Set favicon when DOM is ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', updateFavicon);
    } else {
      updateFavicon();
    }
    
    // Watch for system dark mode changes
    if (window.matchMedia) {
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', updateFavicon);
    }
  </script>

  <input type="number" step="any" id="Cd" placeholder="Coefficient of drag" />

  <h3>During Landing</h3>
  <input type="number" step="any" id="v0" placeholder="Velocity (m/s) *" required="" />
  <input type="number" step="any" id="h0" placeholder="Altitude (m) *" required="" />
  <input type="number" step="any" id="m0" placeholder="Current mass (t) *" required="" />

  <button type="submit">Calculate</button>
</form>
