  <script>
    function updateFavicon() {
      const favicon = document.getElementById('favicon');
      const homeFavicon = document.getElementById('home-favicon');
      const isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      const darkIcon = '/assets/images/Favicon-dark.png';
      const lightIcon = '/assets/images/Favicon-light.png';

      if (favicon) favicon.href = isDark ? darkIcon : lightIcon;
      if (homeFavicon) homeFavicon.src = isDark ? darkIcon : lightIcon;
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', updateFavicon);
    } else {
      updateFavicon();
    }

    if (window.matchMedia) {
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', updateFavicon);
    }
  </script>

    <h1>Open Loop Landing Burn Calculator</h1>
    <p class="version">Version: v1.2</p>

<p class="caption">Tutorial <a href="/2026/03/02/landing-burn-calculator-tutorial/">here</a>, offline Python version available for cloning on <a href="https://github.com/daszeal/Constant-Throttle-for-Propulsive-Landing">GitHub</a>.</p>

<form id="landing-form" class="tool-form">

<h3>Mode</h3>
  <div class="mode-selector">
    <label>
      <input type="radio" name="mode" value="vacuum" id="vacuum" required="" />
      <span>Vacuum</span>
    </label>
    <label>
      <input type="radio" name="mode" value="earth" id="earth" />
      <span>Earth</span>
    </label>
    <label>
      <input type="radio" name="mode" value="kerbin" id="kerbin" />
      <span>Kerbin</span>
    </label>
  </div>

  <h3>Pre-launch</h3>
  <input type="number" step="any" id="m_dry" placeholder="Dry Mass (t) *" required="" />
  <input type="number" step="any" id="thrust_max" placeholder="Thrust (kN) *" required="" />
  <input type="number" step="any" id="Isp" placeholder="Isp (sec) *" required="" />
  <input type="number" step="any" id="diameter" placeholder="Rocket diameter (m)" />
  <input type="number" step="any" id="gravity" placeholder="Gravity (m/s²)" />
  <input type="number" step="any" id="Cd" placeholder="Coefficient of drag" />

  <h3>During Landing</h3>
  <input type="number" step="any" id="v0" placeholder="Velocity (m/s) *" required="" />
  <input type="number" step="any" id="h0" placeholder="Altitude (m) *" required="" />
  <input type="number" step="any" id="m0" placeholder="Current mass (t) *" required="" />

  <button type="submit">Calculate</button>
</form>

<div id="result" class="tool-result"></div>
<p><br /></p>

<script src="/assets/js/landing-two.js" defer=""></script>
