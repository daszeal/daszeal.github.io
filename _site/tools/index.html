  <script>
    function updateFavicon() {
      const favicon = document.getElementById('favicon');
      const homeFavicon = document.getElementById('home-favicon');
      const isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      const darkIcon = '/assets/images/Favicon-dark.png';
      const lightIcon = '/assets/images/Favicon-light.png';

      if (favicon) favicon.href = isDark ? darkIcon : lightIcon;
      if (homeFavicon) homeFavicon.src = isDark ? darkIcon : lightIcon;
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', updateFavicon);
    } else {
      updateFavicon();
    }

    if (window.matchMedia) {
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', updateFavicon);
    }
  </script>

  </script>
